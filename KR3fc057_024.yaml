body:
  text: 第四行左行又以第四行減右行下位亦是同減異加右行餘麻空麥二斗正菽二十八斗負荅十四斗正黍一斗正如下圖麻麥菽荅黍右行第二行第四行左行次以右行去第二行及第四行下位先以右行三之得麥六斗正菽八十四斗負荅四十二斗正黍三斗正以同減異加第二行第二行餘麻二十五斗負麥空菽四十斗負荅五十九斗正下空又以右行四之得麥八斗正菽一百一十二斗負荅五十六斗
