body:
  text: 第四行左行次以第四行減左行菽位不足減乃止法以第四行菽四十三除左行菽一百三十三得三不盡四乃以三徧乘第四行得麻三斗負麥九斗負菽一百二十九斗正荅六十六斗負以同減異加左行左行餘麻十七斗正麥四斗負菽四斗正荅二十三斗負如下圖麻麥菽荅黍右行第二行第四行左行次以左行減第二行頭位此是異減同加減訖第二行餘麻八斗負麥四斗負菽三十六斗負荅三十六
