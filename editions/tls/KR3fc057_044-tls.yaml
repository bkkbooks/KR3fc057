  text: 左行次以左行去右行荅位以左行倍之得菽十斗負荅六斗正以異減同加右行右行餘菽十斗負荅空黍五斗正又各以五約之得菽二斗負荅空黍一斗正如下圖麻麥菽荅黍右行第二行第四行左行次以右行去第二行下位先倍右行以同減異加第二行第二行餘麥一斗負菽二斗負荅二斗正如下圖麻麥菽荅黍右行
