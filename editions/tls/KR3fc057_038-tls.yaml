body:
  text: 菽九十五得十九乃以十九徧乘左行得菽九十五斗負荅五十七斗正以異減同加第二行第二行餘麥五斗負菽空荅四正如下圖麻麥菽荅黍右行第二行第四行左行又以左行減第四行及右行菽位不足減乃止先以左行菽五除第四行菽四十三得八不盡乃以八徧乘左行得菽四十斗負荅二十四斗正以異減同加第四行第四行餘麻一斗負麥三斗負菽三斗正荅二斗正又以左行菽五除右行菽二十八得五不盡三乃以五徧乘左行得菽二十五斗負荅一十五斗正以同減異加右行右行餘麥二斗正菽三斗負荅一斗負黍一斗正如下圖麻麥菽荅黍
