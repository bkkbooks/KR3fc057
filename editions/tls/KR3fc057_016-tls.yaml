body:
  text: 右行下位置右行下位一百四十以第三行下位四除之得三十五乃以三十五徧乘第三行得麻三十五斗正麥空菽一百四十斗正荅一百無斗負黍空錢一百四十正以同減異加右行右行餘麻二十六斗負麥七斗正菽一百三十七斗負荅一百七斗正黍五斗正下空次去第二行下位置第二行下一百二十八以第三行下位四除之得三十二乃以三十二徧乘第三行得麻三十二斗正麥空菽一百二十八斗正荅九十六斗負黍空錢一百二十八正以同減異加第二行第二行餘麻二十五斗負麥六斗正菽一百二十四斗負荅一百一斗正黍三斗正下空次去第四行下位置第四行下位一百一十二以第三行下位四除之得二十八乃以二十八徧乘第三行得麻二十八斗正麥空菽一百一十二斗正荅八十四斗負黍空錢一百一十二以同減異加第四行第四行餘麻二十六斗負麥五斗正菽一百九斗負荅九十三斗正黍四斗正下空並如下圖麻麥菽荅黍錢右行
