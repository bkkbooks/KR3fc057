body:
  text: 斗負荅三百一十七斗正黍二十斗正下空既減訖廢去第三行不用如下圖麻麥菽荅黍右行第二行第四行左行次以第四行去左行下位以第四行下位四除左行下位二十得五乃以五徧乘第四行得麻一百三十斗負麥二十五斗正菽五百四十五斗負荅四百六十五斗正黍二十斗正以同減異加左行左行餘麻三十三斗正麥十三斗負菽一百七十三斗正荅一百四十八斗負下空如下圖麻麥菽荅黍右行第二行
