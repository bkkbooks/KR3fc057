body:
  text: 乘第四行得麻十七斗負麥五十一斗負菽七百三十一斗正荅三百七十四斗負以異減同加左行左行餘麥五十五斗負菽七百三十五斗正荅三百九十七斗負又倍第四行得麻二斗負麥六斗負菽八十六斗正荅四十四斗負以同減異加第二行第二行餘麥五斗負菽九十五斗正荅五十三斗負如下圖麻麥菽荅黍右行第二行第四行左行次以第二行去左行頭位法以第二行麥五除左行麥五十五得十一乃以十一徧乘第二行得麥五十五斗負菽一千四十五斗正荅五百八十三負以同減異加左行左行餘菽三百一十斗負荅一百八十六斗正如下圖
